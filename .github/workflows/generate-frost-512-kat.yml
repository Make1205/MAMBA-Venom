name: Generate MAMBA-Frost-512 KAT

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-kat:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Build and run KAT (Reference/Optimized)
        run: |
          set -euo pipefail

          REF_DIR="API_PKC/Implementations/Reference_Implementation/MAMBA-Frost-512"
          OPT_DIR="API_PKC/Implementations/Optimized_Implementation/MAMBA-Frost-512"

          (cd "$REF_DIR" && make clean && make && ./KAT_KEM)
          (cd "$OPT_DIR" && make clean && make && ./KAT_KEM)

      - name: Compare KAT outputs and stage final vector
        run: |
          set -euo pipefail

          REF_DIR="API_PKC/Implementations/Reference_Implementation/MAMBA-Frost-512"
          OPT_DIR="API_PKC/Implementations/Optimized_Implementation/MAMBA-Frost-512"
          OUT_FILE="API_PKC/Test_Vectors/KAT_KEM_MAMBA-Frost-512.txt"

          REF_KAT=$(find "$REF_DIR" -type f -name 'KAT_KEM*.txt' -printf '%T@ %p\n' | sort -nr | head -n1 | cut -d' ' -f2-)
          OPT_KAT=$(find "$OPT_DIR" -type f -name 'KAT_KEM*.txt' -printf '%T@ %p\n' | sort -nr | head -n1 | cut -d' ' -f2-)

          if [ -z "${REF_KAT:-}" ] || [ -z "${OPT_KAT:-}" ]; then
            echo "Missing generated KAT file(s)."
            exit 1
          fi

          cmp "$REF_KAT" "$OPT_KAT"

          cp "$REF_KAT" "$OUT_FILE"

          SIZE_BYTES=$(stat -c%s "$OUT_FILE")
          SHA256=$(sha256sum "$OUT_FILE" | awk '{print $1}')
          echo "Generated $OUT_FILE"
          echo "size_bytes=$SIZE_BYTES"
          echo "sha256=$SHA256"

          git add -- API_PKC/Test_Vectors/KAT_KEM_MAMBA-Frost-512.txt

      - name: Commit KAT if changed
        run: |
          set -euo pipefail

          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Generate MAMBA-Frost-512 API_PKC KAT vector"
          git push
